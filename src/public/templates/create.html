<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillChain – Create Lesson</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/create.css">
</head>

<body>
  <!-- ====== NAV BAR =========-->
  <section class="navbar" id="navbar">

    <div class="logo">
      <!-- <img src="/src/public/images/logo.png" alt="" /> -->
      <h2>SkillChain</h2>
    </div>

    <ul class="links">
      <!-- <h4>Main</h4> -->
      <li>
        <a href="/">Home</a>
      </li>

      <li>
        <a href="/support">Contact</a>
      </li>
      <li><a href="/activity">Activity</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/signup">Register</a></li>
    </ul>
  </section>
  <hr>


  <section class="page create-lesson" id="create-lesson">

    <!-- Header -->
    <header class="dashboard-header">
      <div class="logo">SkillChain</div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-container">
      <section class="dashboard-card auth-form">

        <h1 class="section-title">Create New Lesson</h1>
        <p class="section-text">
          Share your knowledge with students across SkillChain.
        </p>

        <form id="create-lesson-form">

          <!-- TITLE -->
          <div class="form-group">
            <label for="lesson-title">Lesson Title</label>
            <input type="text" id="lesson-title" placeholder="Enter lesson title" required>
          </div>

          <!-- CATEGORY -->
          <div class="form-group">
            <label for="lesson-category">Category</label>
            <select id="lesson-category" required>
              <option value="" disabled selected>Select category</option>
              <option value="mathematics">Mathematics</option>
              <option value="physics">Physics</option>
              <option value="chemistry">Chemistry</option>
              <option value="programming">Programming</option>
              <option value="python">Python</option>
              <option value="__add_new__">+ Add new category</option>
            </select>
          </div>

          <!-- ADD NEW CATEGORY -->
          <div id="new-category-wrapper" class="form-group" style="display:none;">
            <input type="text" id="new-category-input" placeholder="Enter new category">
            <button type="button" id="add-category-btn" class="btn btn-primary btn-block">
              Add Category
            </button>
          </div>

          <!-- CONTENT -->
          <div class="form-group">
            <label for="lesson-content">Lesson Content</label>
            <textarea id="lesson-content" placeholder="Write lesson content here..." required></textarea>
          </div>

          <!-- MEDIA -->
          <div class="form-group">
            <label for="lesson-media">Media (optional)</label>
            <input type="file" id="lesson-media" accept="image/*,video/*">
          </div>

          <!-- DIFFICULTY -->
          <div class="form-group">
            <label for="lesson-difficulty">Difficulty Level</label>
            <select id="lesson-difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="btn btn-primary btn-block">
            Create Lesson
          </button>

        </form>

      </section>
    </main>

  </section>

  <script src="/src/public/scripts/base/core.js"></script>
  <script src="/src/public/scripts/base/main.js"></script>
  <script src="/src/public/scripts/pages/auth.js"></script>
  <script src="/src/public/scripts/pages/dashboard.js"></script>
  <script src="/src/public/scripts/UI/components.js"></script>
  <script src="/src/public/scripts/UI/theme.js"></script>

</body>

</html>
