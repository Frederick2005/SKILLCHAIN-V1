    document.addEventListener("DOMContentLoaded", () => {
      const lessonId = localStorage.getItem("lessonId");

      // Lesson content fetch (unchanged)
      fetch(`/api/content/${lessonId}`)
        .then(res => res.json())
        .then(data => {
          document.querySelector(".lesson-title").textContent = data.title;
          document.querySelector(".lesson-description").innerHTML = data.description;
          document.getElementById("view-count").textContent = data.views;
          document.getElementById("like-count").textContent = data.likes.length;
        })
        .catch(() => {
          document.querySelector(".lesson-title").textContent = "Lesson not found";
        });

      // ---- reusable comment loader ----
      function loadComments() {
        fetch(`/api/comments/${lessonId}`, {
          headers: { Authorization: `Bearer ${localStorage.getItem('authToken')}` }
        })
          .then(res => res.json())
          .then(comments => {
            const commentsList = document.querySelector(".comments-list");
            commentsList.innerHTML = "";
            document.getElementById("comment-count").textContent = comments.length;

            comments.forEach(comment => {
              const commentElement = document.createElement("div");
              const commentAuthor = document.createElement("p");
              const commentText = document.createElement("p");
              const deleteButton = document.createElement("button");

              commentElement.classList.add("comment");
              commentAuthor.classList.add("comment-author");
              commentText.classList.add("comment-text");
              deleteButton.classList.add("delete-button");
              deleteButton.textContent = "Delete";

              // Only show delete button if comment belongs to logged-in user
              if (localStorage.getItem("userId") !== comment.user?._id) {
                deleteButton.style.display = "none";
              }

              deleteButton.addEventListener("click", () => {
                fetch(`/api/comments/${comment._id}`, {
                  method: "DELETE",
                  headers: { Authorization: `Bearer ${localStorage.getItem('authToken')}` }
                })
                  .then(res => {
                    if (res.ok) {
                      commentElement.remove();
                      document.getElementById("comment-count").textContent =
                        document.querySelectorAll(".comment").length;
                    }
                  })
                  .catch(err => console.error("Error deleting comment:", err));
              });

              // Reply toggle button
              const replyToggle = document.createElement("button");
              replyToggle.textContent = "Reply";
              replyToggle.classList.add("reply-toggle");

              // Reply form (hidden by default)
              const replyForm = document.createElement("div");
              replyForm.classList.add("reply-form");
              replyForm.style.display = "none";
              replyForm.innerHTML = `
  <textarea class="reply-input" placeholder="Write a reply..."></textarea>
  <button class="reply-submit">Post Reply</button>
`;

              // Reply list
              const replyList = document.createElement("div");
              replyList.classList.add("reply-list");

              // Toggle reply form
              replyToggle.addEventListener("click", () => {
                replyForm.style.display = replyForm.style.display === "none" ? "block" : "none";
              });

              // Load replies for this comment
              fetch(`/api/replies/${comment._id}`, {
                headers: { Authorization: `Bearer ${localStorage.getItem("authToken")}` }
              })
                .then(res => res.json())
                .then(replies => {
                  replies.forEach(reply => {
                    const replyEl = document.createElement("div");
                    const replyAuthor = document.createElement("p");
                    const replyText = document.createElement("p");

                    replyEl.classList.add("reply");
                    replyAuthor.textContent = reply.user?.username ?? "Unknown";
                    replyText.innerHTML = reply.reply;   // HTML from Quill

                    replyEl.appendChild(replyAuthor);
                    replyEl.appendChild(replyText);
                    replyList.appendChild(replyEl);
                  });
                });

              // Submit a reply
              replyForm.querySelector(".reply-submit").addEventListener("click", () => {
                const replyText = replyForm.querySelector(".reply-input").value.trim();
                if (!replyText) return;

                fetch(`/api/replies`, {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${localStorage.getItem("authToken")}`
                  },
                  body: JSON.stringify({
                    reply: replyText,
                    commentId: comment._id
                  })
                })
                  .then(res => res.json())
                  .then(newReply => {
                    const replyEl = document.createElement("div");
                    const replyAuthor = document.createElement("p");
                    const replyText = document.createElement("p");

                    replyEl.classList.add("reply");
                    replyAuthor.textContent = newReply.user?.username ?? "Unknown";
                    replyText.innerHTML = newReply.reply;

                    replyEl.appendChild(replyAuthor);
                    replyEl.appendChild(replyText);
                    replyList.appendChild(replyEl);

                    replyForm.querySelector(".reply-input").value = "";
                    replyForm.style.display = "none";
                  });
              });

              commentText.innerHTML = comment.comment;
              commentElement.appendChild(commentAuthor);
              commentElement.appendChild(commentText);
              commentElement.appendChild(deleteButton);
              commentsList.appendChild(commentElement);
              commentElement.appendChild(replyToggle);
              commentElement.appendChild(replyForm);
              commentElement.appendChild(replyList);
            });
          })
          .catch(() => {
            document.querySelector(".comments-list").innerHTML =
              "<p>Could not load comments.</p>";
          });
      }

      loadComments(); // initial load

      // ---- comment form submit ----
      document.getElementById("comment-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const authToken = localStorage.getItem("authToken");
        if (!authToken) {
          alert("You must be logged in to post a comment.");
          return;
        }

        // Validate editor isn't empty
        if (commentQuill.getText().trim().length === 0) {
          alert("Please write something before posting.");
          return;
        }

        const htmlContent = commentQuill.root.innerHTML;  // grab formatted HTML

        fetch(`/api/comments`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${authToken}`
          },
          body: JSON.stringify({
            comment: htmlContent,     // saves formatted HTML
            contentId: lessonId
          })
        })
          .then(res => res.json())
          .then(() => {
            commentQuill.setContents([]);  // clear editor
            loadComments();                // refresh list
          })
          .catch(err => console.error("Error posting comment:", err));
      });

    });

    // Initialize comment editor
    const commentQuill = new Quill('#comment-editor', {
      theme: 'snow',
      modules: { toolbar: '#comment-toolbar' },
      placeholder: 'Write a comment...'
    });
