  <section class="section-main">
    <a href="/explore">Back</a>
    <div class="lesson-card">
      <h2 class="lesson-title"></h2>
      <hr>
      <p class="lesson-description"></p>

        <p><span id="view-count">0</span> Views</p>

    <div class="comments-section">
      <h3>Comments <span id="comment-count">0</span></h3>
      <form id="comment-form">
        <textarea name="comment" placeholder="Write a comment..." required></textarea>
        <button type="submit">Post Comment</button>
      </form>
      <div class="comments-list"></div>

  <!-- load content for explore page -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lessonTitle = document.querySelector(".lesson-title");
      const lessonDescription = document.querySelector(".lesson-description");

      const lessonId = localStorage.getItem("lessonId"); // Get lesson ID from URL
      // Fetch lesson data (replace with actual API call)
      fetch(`/api/content/${lessonId}`) // Example endpoint
        .then((response) => response.json())
        .then((data) => {
          lessonTitle.textContent = data.title;
          lessonDescription.textContent = data.description;
          document.getElementById("view-count").textContent = data.views;
          document.getElementById("like-count").textContent = data.likes.length;
        })
        .catch((error) => {
          console.error("Error fetching lesson data:", error);
          lessonTitle.textContent = "Lesson not found";
          lessonDescription.textContent = "Sorry, we couldn't load the lesson details.";
        });

      // Fetch comments for the lesson (replace with actual API call)
      // find lesson the loop through comments and find the ones that match the lesson id and display them
      fetch(`/api/comments?content=${lessonId}`) // Example endpoint to get comments for a specific content
        .then((response) => response.json())
        .then((comments) => {
          const commentsList = document.querySelector(".comments-list");
          commentsList.innerHTML = ""; // Clear existing comments
          document.getElementById("comment-count").textContent = comments.length;
          comments.forEach((comment) => {
            const commentElement = document.createElement("div");
            const commentAuthor = document.createElement("p");
            const commentText = document.createElement("p");
            const deleteButton = document.createElement("button");
            commentAuthor.classList.add("comment-author");
            deleteButton.textContent = "Delete";
            deleteButton.classList.add("delete-button");

            deleteButton.addEventListener("click", () => {
              const authToken = localStorage.getItem("authToken"); // Get auth token from localStorage (set during login)
              console.log(comment._id);
              
              if (!authToken) {
                alert("Authentication token not found. Please log in again.");
                return;
              }
              fetch(`/api/comments/${comment._id}`, {
                method: "DELETE",
                headers: {
                  Authorization: `Bearer ${authToken}`, // Include auth token in request headers
                },

              })
                .then((response) => {
                  if (response.ok) {
                    commentElement.remove(); // Remove comment from UI
                  } else {
                    throw new Error("Failed to delete comment");
                  }
                })
                .catch((error) => {
                  console.error("Error deleting comment:", error);
                  alert("Sorry, we couldn't delete the comment.");
                });
            });

            // You may want to fetch the username based on the user ID if it's not included in the comment object
            fetch(`/api/users/${comment.user}`) // Example endpoint to get user details
              .then((response) => response.json())
              .then((userData) => {
                commentAuthor.textContent = `Author: ${userData.username}`; // Update with actual username
              })
              .catch((error) => {
                console.error("Error fetching user data:", error);
                commentAuthor.textContent = `User: ${comment.user}`; // Fallback to user ID if username can't be fetched
              });
            commentElement.classList.add("comment");
            commentText.classList.add("comment-text");
            commentText.textContent = comment.comment; // Assuming comment object has a 'comment' field
            commentElement.appendChild(commentAuthor);
            commentElement.appendChild(commentText);
            commentElement.appendChild(deleteButton);
            commentsList.appendChild(commentElement);
          });
        })
        .catch((error) => {
          console.error("Error fetching comments:", error);
          const commentsList = document.querySelector(".comments-list");
          commentsList.innerHTML = "<p>Sorry, we couldn't load the comments.</p>";
        })


    });

    // Handle comment form submission
    document.getElementById("comment-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const commentText = this.comment.value;
      const lessonId = localStorage.getItem("lessonId");

      const userId = localStorage.getItem("userId"); // Get user ID from localStorage (set during login)
      if (!userId) {
        alert("You must be logged in to post a comment.");
        return;
      }
      const authToken = localStorage.getItem("authToken"); // Get auth token from localStorage (set during login)
      if (!authToken) {
        alert("Authentication token not found. Please log in again.");
        return;
      }
      // Submit comment (replace with actual API call)
      fetch(`/api/comments/create`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${authToken}`, // Include auth token in request headers
        },
        body: JSON.stringify({
          user: userId,
          comment: commentText,
        })
      })
        .then((response) => response.json())
        .then((data) => {
          // Handle successful comment submission
          console.log("Comment submitted:", data);
          this.comment.value = ""; // Clear the comment input
        })
        .catch((error) => {
          console.error("Error submitting comment:", error);
        });
    });

  </script>
