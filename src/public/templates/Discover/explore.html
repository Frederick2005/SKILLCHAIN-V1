  <!-- load content for explore page -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Load categories, trending lessons, and top creators
      // loadCategories();
      // loadTrendingLessons();
      // loadTopCreators();

      fetch("/api/content/", {
        headers: {
          Authorization: `Bearer ${localStorage.getItem("authToken")}`,
        },
      })
        .then((response) => response.json())
        .then((data) => {
          console.log("Explore content:", data[0]);
          const contentList = data; // Assuming API returns { content: [...] }
          console.log("Content list:", contentList);

          data.forEach((content) => {
            const ContentContainer = document.createElement("div");
            const ContentTitle = document.createElement("h3");
            const ContentDescription = document.createElement("p");
            const CreatedBy = document.createElement("p");
            const createdAt = document.createElement("p");
            const category = document.createElement("p");
            const viewBTN = document.createElement("button");

            ContentContainer.className = "content-container";
            viewBTN.textContent = "Read More...";
            viewBTN.className = "read-more-btn";
            viewBTN.addEventListener("click", () => {
              localStorage.setItem("lessonId", content._id); // Store lesson ID in localStorage for retrieval on lesson page
              window.location.href = `/lesson/${content._id}`;
            });
            
            ContentTitle.textContent = content.title;

            const LimitedDescription = content.description.substring(0, 100) + "..."; // Limit description to first 100 characters
            ContentDescription.textContent = LimitedDescription;
            category.textContent = `Category: ${content.category}`;
            createdAt.textContent = `Created at: ${new Date(content.createdAt).toLocaleDateString()}`;
            ContentContainer.appendChild(ContentTitle);
            ContentDescription.appendChild(viewBTN);
            ContentContainer.appendChild(ContentDescription);
            ContentContainer.appendChild(category);
            ContentContainer.appendChild(createdAt);



            // verify if loggenin user is the creator of the lesson. then allow edit permission
            if (localStorage.getItem("userId") === content.user) {
              const editBTN = document.createElement("button");
              editBTN.textContent = "Edit";
              editBTN.className = "edit-btn";
              editBTN.addEventListener("click", () => {
                window.location.href = `/edit-lesson/${content._id}`;
              });
              ContentContainer.appendChild(editBTN);
            }

            // fetch content creator name
            fetch(`/api/users/${content.user}`, {
              headers: {
                Authorization: `Bearer ${localStorage.getItem("authToken")}`,
              },
            })
              .then((response) => response.json())
              .then((userData) => {
                CreatedBy.textContent = `Created by: ${userData.username}`;
                ContentContainer.appendChild(CreatedBy);
              })
              .catch((error) =>
                console.error("Error fetching creator:", error),
              );

            document
              .getElementById("content-list")
              .appendChild(ContentContainer);
          });
        });

      // // Check if user is authenticated
      // const token = localStorage.getItem('authToken');
      // if (!token) {
      //   // Redirect to login if not authenticated
      //   window.location.href = '/signin';
      // }
    });
  </script>
