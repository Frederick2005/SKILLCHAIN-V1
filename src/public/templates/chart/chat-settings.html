<section class="page chat-settings" id="chat-settings">

  <header id="navbar">
    <div class="logo">SkillChain</div>
  </header>

  <main id="main-content">
    <h1>Chat Settings</h1>
    <form id="chat-settings-form">
      <label>
        <input type="checkbox" id="enable-notifications" />
        Enable Notifications
      </label>

      <label>
        <input type="checkbox" id="dark-mode-chat" />
        Enable Dark Mode
      </label>

      <label>
        Default Chat Theme:
        <select id="chat-theme-select">
          <option value="blue">Blue</option>
          <option value="red">Red</option>
          <option value="green">Green</option>
        </select>
      </label>

      <button type="submit">Save Settings</button>
    </form>
  </main>
