<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillChain – Login</title>
  <link rel="stylesheet" href="../../styles/base/main.css" />

</head>
<body>


<section class="page login" id="login">


  <!-- Main Content Wrapper -->
  <main class="dashboard-container">
    <section class="dashboard-card auth-form">

      <h1 class="section-title">Welcome Back</h1>
      <p class="section-text">Login to continue learning and earning.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>

        <div class="form-options">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <p class="auth-footer">Don’t have an account? <a href="/signup">Sign Up</a></p>

    </section>
  </main>

</section>

<script src="/src/public/scripts/pages/auth.js"></script>
<script src="/src/public/scripts/UI/theme.js"></script>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      console.log('Form submitted:', { email, password });
      // Add your API call or validation logic here
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
        .then(response => response.json())
        .then(data => {
          console.log('Success:', data);
          if (data.token) {
        localStorage.setItem('authToken', data.token);
        console.log(data);
        
        localStorage.setItem('userId', data.user._id);
        alert('Login successful!');
          }
          // window.location.href = '/profile';
        })
        .catch((error) => {
          console.error('Error:', error);
        });

        });
  </script>
</body>
</html>
