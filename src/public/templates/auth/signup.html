<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillChain – Sign Up</title>
  <link rel="stylesheet" href="/styles/base/main.css" />

</head>

<body>

  <section class="page signup" id="signup">
    <!-- Main Content Wrapper -->
    <main class="dashboard-container">
      <section class="dashboard-card auth-form">

        <h1 class="section-title">Create an Account</h1>
        <p class="section-text">Join SkillChain and start learning.</p>

        <form id="signup-form">

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email" required>
          </div>

          <div class="form-group">
            <section>
              <label for="role">I am a:</label>
              <select id="role" name="role" required>
                <option value="" disabled selected>Select your role</option>
                <option value="learner">Learner</option>
                <option value="instructor">Instructor</option>
              </select>
            </section>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Sign Up
          </button>

        </form>

        <p class="auth-footer">
          Already have an account?
          <a href="/signin">Login here</a>
        </p>

      </section>
    </main>

  </section>

  <script src="/scripts/pages/auth.js"></script>
  <script src="/scripts/UI/theme.js"></script>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      console.log('Form submitted:', { username, email, password, role });
      // Add your API call or validation logic here
      fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, role })
      })
        .then(response => response.json())
        .then(data => {
          console.log('Success:', data);
          if (data.token) {
        localStorage.setItem('authToken', data.token);
          }
          window.location.href = '/profile';
        })
        .catch((error) => {
          console.error('Error:', error);
        });

        });
  </script>

</body>

</html>
