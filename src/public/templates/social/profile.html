<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillChain – Profile</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="../../styles/base/main.css" />
  
</head>
<body>
<!-- ===== NAVBAR ===== -->
<nav class="main-nav">
  <a href="/" class="nav-logo">skillchain</a>
  <a href="/" class="nav-item">
    <!-- <i class="fa-solid fa-house"></i> -->
    <span>Home</span>
  </a>
  <a href="/about" class="nav-item">
    <!-- <i class="fa-solid fa-circle-info"></i> -->
    <span>About</span>
  </a>
  <a href="/create" class="nav-item">
    <!-- <i class="fa-solid fa-plus"></i> -->
    <span>Create</span>
  </a>
  <a href="/explore" class="nav-item">
    <!-- <i class="fa-solid fa-compass"></i> -->
    <span>Explore</span>
  </a>
  <a href="/profile" class="nav-item active">
    <!-- <i class="fa-solid fa-user"></i> -->
    <span>Profile</span>
  </a>
  <!-- <button id="theme-toggle" class="theme-toggle nav-item sidebar-toggle" aria-label="Toggle theme">
    <i class="fas fa-moon"></i>
    <span>Light Mode</span>
  </button> -->
  <div class="nav-indicator"></div>

<!-- ================= SPA: PROFILE ================= -->
<section class="page profile" id="profile" data-route="profile">
  <main id="main-content" class="container">

    <!-- ================= PROFILE HEADER ================= -->
    <section class="profile-top card">
      <div class="profile-left">
        <div class="avatar-box">
          <img id="profileImg" src="../../images/avatar.jpeg" alt="Profile Picture" />
        </div>
        <span class="rank" id="userRank">User</span>
      </div>

      <div class="profile-center">
        <h1 class="username" id="username">Username</h1>
        <div class="profile-meta-grid">
          <p class="createdAt" id="createdAt"></p>
          <p class="email" id="email"></p>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </section>

    <!-- ================= LEARNER VIEW ================= -->
    <div id="learner-view" class="profile-view">
      <section class="profile-content">
        <section class="card">
          <h3>Profile Info</h3>
          <ul class="stats-list">
            <li>Role: <strong id="userRole">Learner</strong></li>
            <li>Member Since: <strong id="memberSince">--</strong></li>
          </ul>
        </section>
      </section>
    </div>

    <!-- ================= INSTRUCTOR VIEW ================= -->
    <div id="instructor-view" class="profile-view" style="display: none;">
      <section class="profile-content">
        <section class="card">
          <h3>Teaching Statistics</h3>
          <ul class="stats-list">
            <li>Total Content Created: <strong id="contentCreated">0</strong></li>
          </ul>
        </section>

        <section class="card">
          <h3>Quick Actions</h3>
          <div class="action-buttons">
            <button class="btn">Create New Content</button>
            <button class="btn">View Content</button>
          </div>
        </section>
      </section>
    </div>

    <!-- ================= ADMIN VIEW ================= -->
    <div id="admin-view" class="profile-view" style="display: none;">
      <section class="profile-content">
        <section class="card">
          <h3>Admin Panel</h3>
          <ul class="stats-list">
            <li>Role: <strong>Administrator</strong></li>
          </ul>
        </section>
      </section>
    </div>

  </main>
</section>

<!-- ================= GLOBAL SCRIPTS ================= -->
<script src="../../scripts/base/core.js"></script>
<script src="../../scripts/base/main.js"></script>
<script src="../../scripts/pages/auth.js"></script>
<script src="../../scripts/pages/dashboard.js"></script>
<script src="../../scripts/UI/components.js"></script>
<script src="../../scripts/UI/theme.js"></script>

<script src="/scripts/pages/nav.js"></script>

<script>
  // Toggle between views based on user role
  function displayProfileView(userRole) {
    document.getElementById('learner-view').style.display = 'none';
    document.getElementById('instructor-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'none';

    if (userRole === 'instructor') {
      document.getElementById('instructor-view').style.display = 'block';
    } else if (userRole === 'admin') {
      document.getElementById('admin-view').style.display = 'block';
    } else {
      document.getElementById('learner-view').style.display = 'block';
    }
  }

  // Load user data from API
  document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('authToken');
    
    if (!token) {
      console.warn('No authentication token found');
      return;
    }

    try {
      const response = await fetch('/api/auth/profile', {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      
      const profileData = await response.json();
      
      // Populate common fields
      document.getElementById('username').textContent = profileData.username;
      document.getElementById('email').textContent = profileData.email;
      document.getElementById('userRank').textContent = profileData.role.charAt(0).toUpperCase() + profileData.role.slice(1);
      document.getElementById('userRole').textContent = profileData.role.charAt(0).toUpperCase() + profileData.role.slice(1);
      document.getElementById('memberSince').textContent = new Date(profileData.createdAt).toLocaleDateString();
      document.getElementById('createdAt').textContent = new Date(profileData.createdAt).toLocaleDateString();

      // Display appropriate view based on role
      displayProfileView(profileData.role);

      // Populate role-specific data
      if (profileData.role === 'instructor') {
        document.getElementById('contentCreated').textContent = profileData.content?.length || '0';
      }
    } catch (error) {
      console.error('Error fetching profile data:', error);
    }
  });

  // Logout functionality
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('authToken');
    window.location.href = '/signin';
  });
</script>

</body>
</html>
