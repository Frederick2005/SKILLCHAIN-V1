<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillChain – Sign Up</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/signup.css" />
</head>

<body>
  <!-- ====== NAV BAR =========-->
  <section class="navbar" id="navbar">

    <div class="logo">
      <!-- <img src="/src/public/images/logo.png" alt="" /> -->
      <h2>SkillChain</h2>
    </div>

    <ul class="links">
      <!-- <h4>Main</h4> -->
      <li>
        <a href="/">Home</a>
      </li>

      <li>
        <a href="/support">Contact</a>
      </li>
      <li><a href="/activity">Activity</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/signup">Register</a></li>
    </ul>
  </section>
  <hr>

  <section class="auth" id="signup">
    <div class="mini-section">
      <h1 class="section-title">Create an Account</h1>
      <p class="section-text">Join SkillChain and start learning.</p>
    </div>
    <form class="signup-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm password" required>
      </div>

      <p>Already have an account <a href="/signin">Sign in</a></p>

      <button type="submit">
        Sign Up
      </button>

    </form>
    <!-- 
    <p class="auth-footer">
      Already have an account?
      <a href="/src/public/templates/auth/login.html">Login here</a>
    </p> -->

  </section>
</body>

</html>
