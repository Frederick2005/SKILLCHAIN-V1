 <section class="page create-lesson" id="create-lesson">

      <h1>Edit Lesson</h1>
      <!-- <p class="section-text">
        Share your knowledge with students across SkillChain.
      </p> -->

      <form id="edit-lesson-form">

        <!-- TITLE -->
        <div class="form-group">
          <label for="lesson-title">Lesson Title</label>
          <input type="text" id="lesson-title" placeholder="Enter lesson title" required>
        </div>


        <!-- CONTENT -->
        <div class="form-group">
          <label for="lesson-content">Lesson Content</label>
          <textarea id="lesson-content" placeholder="Write lesson content here..." required></textarea>
        </div>
        <!-- SUBMIT -->
        <button type="submit" class="btn btn-primary btn-block">
          Edit Lesson
        </button>

      </form>

  </section>
    <script src="/src/public/scripts/base/core.js"></script>
    <script src="/src/public/scripts/base/main.js"></script>
    <script src="/src/public/scripts/pages/auth.js"></script>
    <script src="/src/public/scripts/pages/dashboard.js"></script>
    <script src="/src/public/scripts/UI/components.js"></script>
    <script src="/src/public/scripts/UI/theme.js"></script>

    <script>
      // load previous lesson data (this would typically be done by fetching the lesson details from the server using the lesson ID from the URL)
      document.addEventListener("DOMContentLoaded", () => {
        // For demonstration, we'll just set some placeholder values
        fetch(`/api/content/${window.location.pathname.split("/").pop()}`, {
          headers: {
            Authorization: `Bearer ${localStorage.getItem("authToken")}`,
          },
        })
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("lesson-title").value = data.title;
            document.getElementById("lesson-content").value = data.description;
            localStorage.setItem("lessonId", data._id);
          });
      });



      // Handle Edit Lesson Form Submission
      document.getElementById('edit-lesson-form').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get form values
        const title = document.getElementById('lesson-title').value;
        const content = document.getElementById('lesson-content').value;
        // const media = document.getElementById('lesson-media').files[0];
        // const difficulty = document.getElementById('lesson-difficulty').value;

        const LessonId = localStorage.getItem("lessonId");

        fetch(`/api/content/${LessonId}`, { // Use the lesson ID from localStorage
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${localStorage.getItem("authToken")}`
          },
          body: JSON.stringify({ title, description: content /*, media, difficulty */ })
        })
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          console.log('Response data:', data);
          if (data.success || data._id) {
            alert('Lesson updated successfully!');
            // Optionally redirect to the lesson view page
            window.location.href = `/explore`;
          } else {
            alert('Failed to update lesson: ' + (data.message || 'Unknown error'));
          }
        })
        .catch(error => {
          console.error('Error updating lesson:', error);
          alert('An error occurred while updating the lesson: ' + error.message);
        });
      });
    </script>
